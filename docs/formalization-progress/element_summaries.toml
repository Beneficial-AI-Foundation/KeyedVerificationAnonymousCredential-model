"§3.3" = "The zero-knowledge argument interface (prover, verifier, simulator) and its simulation-extractability, as used by the credential presentation proofs."
"§3.4" = "Syntax and security of anonymous token schemes with non-interactive issuance."

# Figures that are security games or constructions, i.e. core contributions.
"Figure 5" = "The unforgeability-under-chosen-message-and-verification (UF-CMVA) security game for an algebraic MAC."
"Figure 6" = "The one-more unforgeability game for an anonymous token scheme with non-interactive issuance."
"Figure 8" = "The extractability game for a keyed-verification credential system, with attribute extractors Ext.I and Ext.P."
"Figure 9" = "The μCMZ keyed-verification credential system construction (a variant of MAC_GGM); the boxed part is removable for the one-more unforgeable variant."
"Figure 10" = "The μBBS keyed-verification credential system construction."

