# Curated one-line summaries of the paper's elements, consumed by
# scripts/formalization_progress.py to fill the "Summary" column. Keys are the
# element identifiers ("Theorem 5.1", "Definition 3.1", "Figure 5", "§3.1", ...)
# exactly as the script extracts them from the PDF. Edit these by hand; they are
# descriptions, not the paper's verbatim prose.
#
# Inclusion rule:
#   * Numbered environments (Theorem/Lemma/Definition/Claim/Corollary) are
#     always rows; without an entry here they render as "(summary pending)".
#   * Figures and sections are rows ONLY if they appear below, i.e. only when
#     they carry a mathematical object that should be formalized and that is
#     part of the paper's contributions (a security game, a construction, a
#     hardness assumption, a proof-system interface). Recalled prior-work
#     objects and the §8 "future extensions" are intentionally omitted.

# Rows rendered in light gray. Entries are element keys ("Theorem 2") or
# section prefixes ("§6" covers the section, its subsections, and their
# elements); a "!" prefix exempts a matching element from dimming (e.g.
# "!Theorem 8.7" keeps it undimmed inside a dimmed "§8"). A run can override
# this list with repeatable --dim flags.
# Everything outside µCMZ and its prerequisites is dimmed: the
# µBBS line (§6, Theorem 2), designated-verifier SNARKs (§7, Theorem 3),
# the §8 extensions, and straight-line Σ-protocol extraction (§9). Kept
# undimmed: Theorem 1, the §3 preliminaries, the §4 KVAC definitions, §5.
dim = ["§6", "§7", "§8", "§9", "Theorem 2", "Theorem 3"]
dim_note = "elements outside µCMZ and its prerequisites — µBBS (§6), designated-verifier SNARKs (§7), extensions (§8), straight-line Σ-protocol extraction (§9), and their contribution theorems."

[summaries]
"Theorem 1" = "μCMZ is a keyed-verification anonymous credential system: extractable and anonymous in the algebraic group model, with the stated advantage bounds."
"Theorem 2" = "μBBS is a keyed-verification anonymous credential system: extractable and anonymous in the algebraic group model, with the stated advantage bounds."
"Theorem 3" = "Compiling a polynomial interactive oracle proof with a designated-verifier polynomial commitment yields a designated-verifier fully-succinct SNARK without pairings."

"Definition 3.1" = "Syntax of an algebraic message authentication code for n attributes over a prime-order group: the algorithms Setup, KeyGen, MAC, and Verify."

"Definition 4.1" = "A credential predicate: an efficiently-computable function on attributes that fixes what a presentation proves."
"Definition 4.2" = "A keyed-verification credential system KVAC = (Setup, KeyGen, Issue, Prove) for a predicate family."
"Definition 4.3" = "Honestly issued credentials always produce accepting presentations for the predicates they satisfy."
"Definition 4.4" = "Anonymity: issuance and presentation are simulatable without the secret attributes, so presentations are unlinkable across executions."
"Definition 4.5" = "Extractability: an extractor recovers the certified attributes from any accepting presentation."

"Theorem 5.1" = "In the algebraic group model, μCMZ is an n-attribute algebraic MAC (UF-CMVA secure) under 3-DL (and DL), with advantage Adv^{3-dl} + Adv^{dl} + 3/p."
"Theorem 5.2" = "If ZKP proves the relation R ⊇ R_cmz, then μCMZ is an extractable keyed-verification credential."
"Theorem 5.3" = "If ZKP proves R ⊇ R_cmz.p ∪ R_cmz.is, then the variant μCMZ_AT is a one-more unforgeable anonymous token."
"Lemma 5.4" = "Base case of Theorem 5.1: in the algebraic group model, single-attribute μCMZ is an algebraic MAC over ℤ_p."
"Lemma 5.5" = "Reduces n-attribute μCMZ security to the single-attribute case, giving its algebraic-MAC advantage over ℤ_p."
"Claim 5.6" = "In the μCMZ unforgeability proof, the first forgery case is bounded by the gap discrete-log advantage."
"Claim 5.7" = "In the μCMZ unforgeability proof, the second forgery case is bounded by the single-attribute MAC's UF-CMVA advantage."
"Theorem 5.8" = "If ZKP proves R ⊇ R_cmz, then μCMZ is anonymous (issuance and presentation are simulatable)."
"Theorem 5.10" = "If ZKP proves R ⊇ R_cmz, then μCMZ is extractable for the supported attribute family."
"Theorem 5.11" = "In the algebraic group model, μCMZ_AT is a one-more unforgeable anonymous token for n attributes."
"Claim 5.12" = "In the μCMZ_AT one-more unforgeability proof, case (i) occurs with probability at most q/p plus the discrete-log advantage."
"Claim 5.13" = "In the μCMZ_AT one-more unforgeability proof, case (ii) occurs with probability at most 1/p plus the discrete-log advantage."
"Claim 5.14" = "In the μCMZ_AT one-more unforgeability proof, case (iii) occurs with probability at most 3(1/p plus the 2-discrete-log advantage)."

"Theorem 6.1" = "In the algebraic group model, μBBS is an n-attribute algebraic MAC, with the stated advantage."
"Theorem 6.5" = "Gives the algebraic-MAC advantage of n-attribute μBBS over ℤ_p."
"Theorem 6.6" = "If ZKP proves R ⊇ R_bbs, then μBBS is an extractable keyed-verification credential."
"Theorem 6.7" = "If ZKP proves R ⊇ R_bbs.is ∪ R_bbs.p, then the variant μBBS_AT is a one-more unforgeable anonymous token."
"Lemma 6.8" = "Base case of Theorem 6.1: in the algebraic group model, single-attribute μBBS is an algebraic MAC over ℤ_p."
"Lemma 6.9" = "Reduces n-attribute μBBS security to the single-attribute case, giving its algebraic-MAC advantage over ℤ_p."
"Theorem 6.10" = "If ZKP proves R ⊇ R_bbs, then μBBS is anonymous."
"Theorem 6.11" = "If ZKP proves R ⊇ R_bbs, then n-attribute μBBS is extractable."
"Lemma 6.12" = "Reduces the μBBS_AT one-more unforgeability game to q-strong discrete log (via Cheon's attack), quantifying the security loss."
"Corollary 6.13" = "Exhibits a p.p.t. adversary breaking μBBS_AT one-more unforgeability through the Lemma 6.12 reduction."

"Definition 7.1" = "Syntax and security of a designated-verifier polynomial commitment scheme over a field."
"Theorem 7.3" = "dvKZG, a pairing-free designated-verifier variant of KZG, is a perfectly hiding polynomial commitment scheme."
"Definition 7.4" = "A multi-round interactive oracle proof whose prover messages are low-degree polynomials, for an indexed relation."
"Theorem 7.5" = "Compiling a knowledge-sound PIOP with a designated-verifier polynomial commitment yields a knowledge-sound designated-verifier argument."
"Theorem 7.6" = "Compiling a bounded zero-knowledge PIOP with dvKZG yields a zero-knowledge designated-verifier argument."
"Corollary 7.7" = "Combining the soundness and zero-knowledge compilers gives a designated-verifier fully-succinct zk-SNARK without pairings."

"Theorem 8.2" = "The compiler cRTL[KVAC, PRF] turns a keyed-verification credential (predicates ⊇ {φ_prf, φ_range}) and a compatible PRF into a one-more unforgeable rate-limiting anonymous token."
"Corollary 8.5" = "Instantiates the rate-limiting token from a one-more unforgeable KVAC_AT ∈ {μCMZ_AT, μBBS_AT} with an explicit advantage bound."
"Lemma 8.6" = "Bounds the one-more unforgeability advantage of cRTL[KVAC, PRF] via reductions to KVAC extractability, anonymity, and PRF security (Theorem 8.2 analysis)."
"Theorem 8.7" = "In the random oracle model, if q-DDHI holds over the group generator, the Dodis–Yampolskiy-style HashDY is a pseudorandom function."
"Theorem 8.9" = "A re-randomizable single-attribute keyed-verification credential yields a secure keyed-verification pseudonym system."
"Corollary 8.12" = "Instantiates the pseudonym system from a one-more unforgeable KVAC_AT ∈ {μCMZ_AT, μBBS_AT}."
"Lemma 8.13" = "Security reduction underpinning the pseudonym construction (Theorem 8.9 analysis)."

"Definition 9.1" = "A relation family is admissible if no p.p.t. adversary can find a non-zero kernel vector of the relation's matrix (or of its distinct group generators)."
"Theorem 9.2" = "The Fiat–Shamir Σ-protocol for an admissible linear relation is strongly simulation-extractable (straight-line) in the algebraic group and random oracle models."

# Sections carrying a formalizable object (assumptions, interfaces, primitives).
