# ---------------------------------------------------------------------------
# Accumulated heuristics. Each is a rule a reviewer approved for deciding
# whether a Lean declaration formalizes a paper element. The assistant applies
# these before proposing a mapping and cites the one it used. Add a heuristic
# only after it has settled a real case; delete one that misfires.
# ---------------------------------------------------------------------------

[[heuristic]]
name = "citation-tag-join"
rule = "A Lean docstring or module doc citing `O24 <Element>` (e.g. `O24 Definition 3.1`, `O24 §3.3`, `O24 Eq. 9`) is the primary evidence of a mapping. The tag is mandatory and sits immediately before the element; a bare `Definition 3.1` or a different paper's tag does not link."

[[heuristic]]
name = "kind-match"
rule = "A Definition / Construction / game-or-construction Figure / assumption-or-interface Section needs a definitional construct (def, structure, abbrev, class, inductive, instance). A Theorem / Lemma / Claim / Corollary needs a theorem or lemma. A mismatch is 🌀, not 🟢, even when the citation is correct."

[[heuristic]]
name = "assumption-vs-theorem"
rule = "A declaration naming the hardness advantage a theorem assumes (e.g. threeDlogAdv for Theorem 5.1) formalizes the assumption, not the theorem. Map it 🌀 against the theorem and 🟢 against the assumption's section (§3.1)."

[[heuristic]]
name = "sorry-demotes"
rule = "A declaration of matching kind whose body reaches sorry or admit is 🌐, not 🟢. Check the transitive proof, not only the top-level term."

[[heuristic]]
name = "module-only-is-yellow"
rule = "When a paper element is cited only in a module `/-! … -/` doc and no single declaration of matching kind cites it, the element is 🟡 (module-level coverage), not 🟢."

[[heuristic]]
name = "equations-are-cite-driven"
rule = "Equations are tracked only when a Lean docstring cites `O24 Eq. N`. Do not enumerate every numbered equation; a numbered equation is a right-aligned `(N)` next to display math with no clean anchor, so scanning them is noisy."

[[heuristic]]
name = "figure-precedes-summary"
rule = "A curated figure or section is a row only when it carries a formalizable object (a security game, a construction, a hardness assumption, a proof-system interface). Recalled prior-work objects and the §8 future-extensions are omitted."

# ---------------------------------------------------------------------------
# Open questions and edge cases the reviewer flagged but did not settle. The
# assistant surfaces these at the review gates instead of guessing.
# ---------------------------------------------------------------------------

[[open_question]]
about = "Theorem 5.2 / 5.8 / 5.10 (μCMZ credential security)"
note = "These are stated with the hypothesis `ZKP proves R ⊇ R_cmz`. When the μCMZ credential proofs land, decide whether a partial formalization (statement without proof) is 🌐 or stays ⚪."
