# Curated paper ↔ Lean mapping knowledge base.
#
# This is the learning store of the AI formalization-progress assistant (the
# skill at `.claude/skills/formalization-progress/`). It grows as the project
# grows: every mapping a reviewer confirms is recorded here so a later run
# reuses the decision instead of re-deriving it, and every heuristic or edge
# case a reviewer approves is written down so the assistant applies it again.
#
# It is versioned in git and meant to be read and edited by hand. The assistant
# proposes additions; a human confirms them (workflow phases 2, 4, and 5 of the
# skill). Nothing here is authoritative about the mathematics; each mapping is a
# reviewed claim that the cited Lean declaration formalizes the cited paper
# element, not a machine-checked proof of it.
#
# It coexists with the deterministic Python tracker
# (`../formalization_progress.py`); see `README.md` in this directory.

[meta]
paper_tag = "O24"                      # citation prefix used in Lean docstrings
paper = "Michele Orrù, Revisiting Keyed-Verification Anonymous Credentials, IACR ePrint 2024/1552"
lean_root = "KVAC"

# ---------------------------------------------------------------------------
# Status vocabulary (kept identical to the Python tracker so the two agree).
#   🟢  a sorry-free Lean declaration of the matching kind is cited
#   🌐  a matching declaration exists but its body contains sorry / admit
#   🌀  a declaration is cited but its kind does not match the paper object
#   🟡  only module-level (/-! … -/) coverage
#   ⚪  nothing yet
# "Matching kind": a Definition / Construction / Figure(game or construction) /
# Section(assumption or interface) must be backed by a definitional construct;
# a Theorem / Lemma / Claim / Corollary must be backed by a theorem or lemma.
# ---------------------------------------------------------------------------

# Confirmed mappings. `element` is the paper element key (a numbered environment,
# a curated figure or section, or any span the developer chose to track);
# `decls` lists the Lean declarations; `evidence` records how the mapping was
# established ("citation" for an O24 tag, "statement-match" for a judged match,
# "asserted" for a reviewer's direct assertion); `confirmed_by` and
# `confirmed_on` record the review; `rationale` states why it was accepted.
# The mappings below were seeded from O24-tagged citations, so evidence is
# "citation"; a fidelity sweep or a reviewer may add others.

[[mapping]]
element = "Definition 3.1"
kind = "Definition"
decls = ["AlgebraicMACSyntax", "AlgebraicMAC", "Correct", "μCMZBaseMAC"]
files = [
  "KVAC/Core/AlgebraicMAC/Construction.lean",
  "KVAC/Core/AlgebraicMAC.lean",
  "KVAC/Core/AlgebraicMAC/Correctness.lean",
  "KVAC/Schemes/MicroCMZ/Construction.lean",
]
status = "🟢"
rationale = "Syntax of an algebraic MAC (Setup, KeyGen, MAC, Verify) is a structure; correctness is a def; μCMZBaseMAC instantiates the same definition."

